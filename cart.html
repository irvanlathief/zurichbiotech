<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart | Zurich Biotech</title>
    <meta name="description" content="Review your research peptide order and check out via WhatsApp." />
    <link rel="canonical" href="https://zurichbiotech.com/cart.html" />
    <meta name="robots" content="noindex, follow" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <style>
      .cart-page { min-height: 100vh; padding: 120px clamp(16px, 5vw, 48px) 80px; max-width: 900px; margin: 0 auto; }
      .cart-page h1 { font-size: clamp(36px, 4vw, 64px); font-weight: 400; margin-bottom: 48px; }
      .cart-item { display: grid; grid-template-columns: 1fr auto auto auto; gap: 24px; align-items: center; border-bottom: 1px solid var(--gray-200); padding: 24px 0; }
      .cart-item h3 { font-size: 24px; font-weight: 400; margin: 0; }
      .cart-item p { color: var(--gray-700); margin: 4px 0 0; }
      .qty-control { display: flex; align-items: center; gap: 12px; font-family: var(--tech); }
      .qty-control button { width: 32px; height: 32px; border: 1px solid var(--gray-200); background: var(--white); cursor: pointer; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; }
      .qty-control button:hover { border-color: var(--black); }
      .cart-item .price { font-family: var(--tech); font-size: 20px; }
      .cart-item .remove { color: var(--red); font-family: var(--tech); font-size: 13px; text-transform: uppercase; cursor: pointer; background: none; border: none; }
      .cart-summary { margin-top: 48px; text-align: right; }
      .cart-summary strong { font-size: 32px; font-weight: 400; }
      .cart-summary p { color: var(--gray-700); margin: 8px 0 24px; }
      .cart-empty { color: var(--gray-700); font-family: var(--tech); margin-top: 48px; }
      .checkout-form { margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--gray-200); }
      .checkout-form h3 { font-size: 20px; font-weight: 500; margin: 0 0 24px; }
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; font-family: var(--tech); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-700); margin-bottom: 8px; }
      .form-group input { width: 100%; padding: 14px 16px; border: 1px solid var(--gray-200); font-family: var(--mono); font-size: 15px; background: var(--white); transition: border-color 180ms ease; box-sizing: border-box; }
      .form-group input:focus { outline: none; border-color: var(--black); }
      .checkout-btn { display: inline-flex; width: 100%; max-width: 400px; min-height: 64px; align-items: center; justify-content: center; gap: 16px; border: 1px solid var(--black); background: var(--black); color: var(--white); padding: 18px 28px; font-family: var(--tech); font-weight: 700; text-transform: uppercase; transition: background 180ms ease, color 180ms ease, opacity 180ms ease; cursor: pointer; }
      .checkout-btn:hover:not(:disabled) { background: var(--white); color: var(--black); }
      .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .tc-wrap { display: flex; align-items: flex-start; gap: 12px; max-width: 400px; margin: 24px auto 0; text-align: left; }
      .tc-wrap input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--black); flex-shrink: 0; cursor: pointer; }
      .tc-wrap label { font-family: var(--tech); font-size: 13px; line-height: 1.5; color: var(--gray-700); cursor: pointer; }
      .tc-wrap label a { color: var(--black); text-decoration: underline; }
      .nav-cta { position: relative; }
      .nav-cta .cart-count { position: absolute; top: -6px; right: -10px; }
      @media (max-width: 640px) {
        .cart-item { grid-template-columns: 1fr auto; gap: 12px; padding: 20px 0; }
        .cart-item .price { grid-column: 2; }
        .cart-item .remove { grid-column: 2; justify-self: end; }
        .cart-item .qty-control { grid-column: 1 / -1; justify-self: start; }
        .checkout-btn { max-width: none; }
        .cart-summary { text-align: left; }
      }
    </style>
    
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
  <body>
    <header class="site-header" aria-label="Primary navigation">
      <a class="brand" href="index.html" aria-label="Zurich Biotech home">Zurich Biotech<span>+</span></a>
      <nav>
        <a href="index.html#protocols">Protocols</a>
        <a href="index.html#science">Science</a>
        <a href="index.html#compounds">Compounds</a>
        <a href="/analysis/">Analysis</a>
        <a href="/resources/">Resources</a>
        <a href="index.html#truth">About</a>
        <a class="nav-cta" href="cart.html" aria-label="Cart">Your Cart <span class="cart-count" id="cartCount">0</span></a>
      </nav>
    </header>

    <main class="cart-page">
      <h1>Your Cart<span>+</span></h1>
      <div id="cartItems"></div>
      <div class="cart-summary" id="cartSummary" style="display:none;">
        <p>Research use only. Not for human consumption.</p>
        <strong id="cartTotal">$0.00</strong>

        <div class="checkout-form" id="checkoutForm">
          <h3>Delivery Details</h3>
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" />
          </div>
          <div class="form-group">
            <label for="villaLocation">Google Maps Link of Your Villa</label>
            <input type="url" id="villaLocation" placeholder="https://maps.google.com/..." />
          </div>
        </div>

        <div class="tc-wrap">
          <input type="checkbox" id="tcCheck" />
          <label for="tcCheck">I have read and agree to the <a href="terms.html" target="_blank" rel="noopener noreferrer">Terms & Conditions</a>. I understand these products are for research use only and not for human consumption.</label>
        </div>
        <div style="margin-top:24px;">
          <button class="checkout-btn" id="checkoutBtn" disabled>Proceed to Checkout <span>+</span></button>
        </div>
      </div>
      <p class="cart-empty" id="cartEmpty">Your cart is empty. <a href="index.html#compounds" style="border-bottom:1px solid var(--black);">Browse compounds</a>.</p>
    </main>

    <script>
      function formatPrice(price) {
        return "Rp" + price.toLocaleString("id-ID");
      }

      function getCart() {
        const raw = localStorage.getItem("zbCart");
        return raw ? JSON.parse(raw) : {};
      }
      function saveCart(cart) {
        localStorage.setItem("zbCart", JSON.stringify(cart));
        updateCartCount();
        renderCart();
      }
      function updateCartCount() {
        const cart = getCart();
        const total = Object.values(cart).reduce((sum, item) => sum + (item.qty || 0), 0);
        const el = document.getElementById("cartCount");
        if (el) el.textContent = total;
      }
      function removeFromCart(key) {
        const cart = getCart();
        delete cart[key];
        saveCart(cart);
      }
      function addQty(key) {
        const cart = getCart();
        if (cart[key]) { cart[key].qty += 1; saveCart(cart); }
      }
      function subQty(key) {
        const cart = getCart();
        if (cart[key]) {
          cart[key].qty -= 1;
          if (cart[key].qty <= 0) delete cart[key];
          saveCart(cart);
        }
      }
      function renderCart() {
        const cart = getCart();
        const items = Object.values(cart);
        const itemsEl = document.getElementById("cartItems");
        const summaryEl = document.getElementById("cartSummary");
        const emptyEl = document.getElementById("cartEmpty");
        if (!items.length) { itemsEl.innerHTML = ""; summaryEl.style.display = "none"; emptyEl.style.display = "block"; return; }
        emptyEl.style.display = "none";
        summaryEl.style.display = "block";
        itemsEl.innerHTML = items.map((item) => {
          const stackLine = item.stack
            ? `<p style="font-size:13px;color:var(--gray-700);margin-top:6px;">${item.stack.map(([name, dose]) => `${name} ${dose}`).join(" · ")}</p>`
            : (item.goal ? `<p style="font-size:13px;color:var(--gray-700);margin-top:6px;">${item.goal}</p>` : "");
          return `
          <div class="cart-item">
            <div>
              <h3>${item.title}</h3>
              <p>${item.type}</p>
              ${stackLine}
            </div>
            <div class="qty-control">
              <button onclick="subQty('${item.key}')">−</button>
              <span>${item.qty}</span>
              <button onclick="addQty('${item.key}')">+</button>
            </div>
            <span class="price">${formatPrice(item.qty * item.price)}</span>
            <button class="remove" onclick="removeFromCart('${item.key}')">Remove</button>
          </div>
        `;
        }).join("");
        const total = items.reduce((sum, item) => sum + (item.qty * item.price), 0);
        document.getElementById("cartTotal").textContent = formatPrice(total);
      }
      updateCartCount();
      renderCart();

      /* ─────────── form validation ─────────── */
      const fullNameInput = document.getElementById("fullName");
      const villaLocationInput = document.getElementById("villaLocation");
      const tcCheck = document.getElementById("tcCheck");
      const checkoutBtn = document.getElementById("checkoutBtn");

      function validateCheckoutForm() {
        const name = fullNameInput.value.trim();
        const location = villaLocationInput.value.trim();
        const tcAgreed = tcCheck.checked;
        const isValidUrl = location.startsWith("http://") || location.startsWith("https://") || location.startsWith("maps.google") || location.startsWith("www.google.com/maps");
        checkoutBtn.disabled = !(name && location && isValidUrl && tcAgreed);
      }

      fullNameInput.addEventListener("input", validateCheckoutForm);
      villaLocationInput.addEventListener("input", validateCheckoutForm);
      tcCheck.addEventListener("change", validateCheckoutForm);

      /* ─────────── WhatsApp checkout ─────────── */
      const WHATSAPP_CONFIG = {
        adminNumber: "61408703955",        // <-- Your WhatsApp number with country code, no + (e.g. "6281234567890")
        useCallMeBot: false,    // <-- Set to true to also ping your own WhatsApp via CallMeBot
        callMeBotPhone: "",     // <-- Your phone number for CallMeBot (with country code)
        callMeBotApiKey: "",    // <-- API key from CallMeBot (get at callmebot.com)
      };

      function generateOrderId() {
        const ts = Date.now().toString(36).toUpperCase();
        const rand = Math.random().toString(36).substring(2, 5).toUpperCase();
        return `ZB-${ts}${rand}`;
      }

      function proceedToCheckout() {
        const cart = getCart();
        const items = Object.values(cart);
        if (!items.length) return;

        const fullName = fullNameInput.value.trim();
        const villaLocation = villaLocationInput.value.trim();
        if (!fullName || !villaLocation) return;

        const orderId = generateOrderId();
        const total = items.reduce((s, it) => s + it.qty * it.price, 0);

        const itemLines = items.map(it => {
          const stackPart = it.stack ? ` (${it.stack.map(([n, d]) => `${n} ${d}`).join(", ")})` : "";
          return `• ${it.title}${stackPart} | Qty: ${it.qty} | ${formatPrice(it.qty * it.price)}`;
        });

        const message = [
          `Hi Zurich Biotech, I'd like to place an order:`,
          ``,
          `Name: ${fullName}`,
          `Villa Location: ${villaLocation}`,
          ``,
          ...itemLines,
          ``,
          `Total: ${formatPrice(total)}`,
          ``,
          `Order ref: ${orderId}`,
          `Please send me the payment link. Thanks!`,
        ].join("\n");

        // Optional: notify admin via CallMeBot
        if (WHATSAPP_CONFIG.useCallMeBot && WHATSAPP_CONFIG.callMeBotPhone && WHATSAPP_CONFIG.callMeBotApiKey) {
          const adminMsg = [
            `🧬 NEW ORDER: ${orderId}`,
            `Name: ${fullName}`,
            `Villa: ${villaLocation}`,
            `Items: ${items.map(it => `${it.title} x${it.qty}`).join(", ")}`,
            `Total: ${formatPrice(total)}`,
          ].join("\n");

          fetch(`https://api.callmebot.com/whatsapp.php?phone=${WHATSAPP_CONFIG.callMeBotPhone}&apikey=${WHATSAPP_CONFIG.callMeBotApiKey}&text=${encodeURIComponent(adminMsg)}`)
            .catch(() => {}); // Silent fail. Customer flow is the priority.
        }

        // Open WhatsApp for customer
        const waUrl = `https://wa.me/${WHATSAPP_CONFIG.adminNumber}?text=${encodeURIComponent(message)}`;
        window.open(waUrl, "_blank");

        // Clear cart
        localStorage.removeItem("zbCart");
        updateCartCount();
        renderCart();
      }

      checkoutBtn.addEventListener("click", proceedToCheckout);
    </script>
  </body>
</html>
